<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>반야프레임 샌드박스</title>
    <link rel="stylesheet" href="css/engine.css">
    <style>
        #panels {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
            gap: 0;
            overflow: hidden;
            min-height: 0;
        }
        #panel-sphere {
            grid-column: 1;
            grid-row: 1;
        }
        #sphere-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 768px) {
            #toolbar { flex-wrap: wrap; gap: 6px; padding: 0 8px; }
            #toolbar h1 { font-size: 13px; }
        }
        .info-section {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
        }
        .info-section h3 {
            font-size: 11px;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 1px 0;
        }
        .info-row .label { color: #cbd5e1; text-transform: uppercase; font-size: 11px; letter-spacing: 0.3px; }
        .info-row .value { color: var(--text-primary); font-weight: 600; }
        .info-row .value.hot { color: var(--hot); }
        .info-row .value.warm { color: var(--warm); }
        .info-row .value.cold { color: var(--cold); }
        .info-row .value.budget { color: var(--accent-cas); }

        .dring-mini {
            display: flex;
            gap: 2px;
            margin-top: 4px;
        }
        .dring-mini .bit {
            width: 22px;
            height: 22px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 700;
            border: 1px solid var(--border);
        }
        .dring-mini .bit.on { background: var(--bit-on); color: #f59e0b; font-weight: 700; }
        .dring-mini .bit.off { background: var(--bit-off); color: var(--text-dim); }

        .fsm-mini {
            display: flex;
            gap: 2px;
            align-items: center;
            margin-top: 4px;
        }
        .fsm-mini .st {
            width: 30px;
            height: 22px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 700;
            border: 1px solid var(--border);
            background: var(--bit-off);
            color: var(--text-dim);
        }
        .fsm-mini .st.cur {
            background: var(--bit-on);
            border-color: var(--bit-on);
            color: #f59e0b;
        }
        .fsm-mini .ar { color: var(--text-dim); font-size: 8px; }

        .cost-mini {
            display: flex;
            gap: 3px;
            height: 10px;
            margin-top: 4px;
            border-radius: 2px;
            overflow: hidden;
        }
        .cost-mini .seg {
            height: 100%;
            border-radius: 1px;
        }

        .entity-mini {
            font-size: 10px;
            padding: 2px 0;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
<div id="app">
    <div id="toolbar">
        <h1>반야프레임</h1>
        <span style="flex:1"></span>
        <a href="https://ubmscoin.github.io/banya/banya.html" target="_blank" onclick="if(window.pauseEngine){window.pauseEngine();}" style="background:#f59e0b;color:#000;font-size:11px;text-decoration:none;font-weight:700;padding:4px 12px;border-radius:4px;font-family:monospace">반야프레임 채굴하기</a>
    </div>
    <div id="panels">
        <div class="panel" id="panel-sphere" style="position:relative;overflow:hidden;min-height:0">
            <div class="panel-body" style="padding:0;overflow:hidden;width:100%;height:100%">
                <canvas id="sphere-canvas" width="800" height="480" style="cursor:grab;width:100%;height:100%;display:block"></canvas>
            </div>
            <div id="canvas-controls" style="position:absolute;bottom:0;left:0;right:0;height:40px;background:rgba(0,0,0,0.85);display:flex;align-items:center;padding:0 10px;gap:8px;z-index:10">
                <button id="ctrl-play" onclick="ctrlPlay()" style="background:none;border:none;cursor:pointer;color:#fff;font-size:20px;padding:4px 8px">&#9654;</button>
                <div style="flex:1;height:3px;background:rgba(255,255,255,0.15);border-radius:2px">
                    <div id="ctrl-progress" style="height:100%;background:#3b82f6;border-radius:2px;width:0%"></div>
                </div>
                <span id="ctrl-status" style="color:#94a3b8;font-size:10px;font-family:monospace;min-width:30px">정지</span>
                <span style="color:#fff;font-size:12px;font-weight:700;font-family:monospace">속도</span>
                <input type="range" id="speed-slider" min="16" max="500" value="16" step="1" oninput="setSpeed(this.value)" style="width:60px;accent-color:#3b82f6">
                <button id="ctrl-step" onclick="doStep()" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);border-radius:4px;cursor:pointer;color:#fff;font-size:12px;font-weight:700;font-family:monospace;padding:5px 12px;display:none">1틱 ▶</button>
            </div>
        </div>
    </div>
</div>
<script type="module">
    import { Pipeline } from './js/engine/pipeline.js';
    import { Renderer } from './js/ui/renderer.js';

    const renderer = new Renderer();
    const pipeline = new Pipeline({
        ringSize: 30,
        tickInterval: 16,  // 매 프레임 1틱. 60fps = 초당 60틱. 1000틱 수명 = 약 16초
        onTick: (snapshot) => { renderer.render(snapshot); renderInfo(snapshot); }
    });

    function resizeCanvas() {
        const c = document.getElementById('sphere-canvas');
        const p = c.parentElement;
        c.width = p.clientWidth;
        c.height = p.clientHeight;
        renderer.m_canvasW = c.width;
        renderer.m_canvasH = c.height;
    }

    // 전부 캔버스 HUD로 이동됨. renderInfo는 빈 함수
    function renderInfo(s) {}

    window.togglePlay = function() {
        if (pipeline.m_running) { pipeline.pause(); } else { renderer.m_showPlayButton = false; pipeline.play(); }
        renderer.render(pipeline.snapshot());
        p_updateCtrl();
        renderInfo(pipeline.snapshot());
    };
    window.doStep = function() {
        if (pipeline.m_running) { pipeline.pause(); }
        renderer.m_showPlayButton = false;
        pipeline.fireDelta();
        pipeline.step();
        renderer.render(pipeline.snapshot());
        renderInfo(pipeline.snapshot());
        p_updateCtrl();
    };
    window.setSpeed = function(val) { pipeline.setSpeed(parseInt(val)); document.getElementById('speed-value').textContent = val + 'ms'; };
    window.doReset = function() { pipeline.reset(); renderer.m_showPlayButton = true; renderer.render(pipeline.snapshot()); renderInfo(pipeline.snapshot()); p_updateCtrl(); };
    window.setDebug = function(on) { pipeline.m_debugMode = on; renderer.m_debugMode = on; };
    window.pauseEngine = function() { pipeline.pause(); renderer.m_showPlayButton = true; renderer.render(pipeline.snapshot()); p_updateCtrl(); };
    window.ctrlPlay = function() {
        if (pipeline.m_running) {
            pipeline.pause();
        } else {
            renderer.m_showPlayButton = false;
            pipeline.play();
        }
        p_updateCtrl();
    };
    function p_updateCtrl() {
        let _btn = document.getElementById('ctrl-play');
        let _step = document.getElementById('ctrl-step');
        let _status = document.getElementById('ctrl-status');
        let _running = pipeline.m_running;
        if (_btn) { _btn.textContent = _running ? '\u23F8' : '\u25B6'; }
        if (_step) { _step.style.display = _running ? 'none' : 'inline-block'; }
        if (_status) { _status.textContent = _running ? '\uC7AC\uC0DD' : '\uC815\uC9C0'; }
    }

    document.addEventListener('DOMContentLoaded', () => {
        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas(); renderer.render(pipeline.snapshot()); });
        renderer.init();
        renderer.m_onDragRender = function() { renderer.render(pipeline.snapshot()); };
        setDebug(true);  // 시작부터 내부작동 활성
        renderer.render(pipeline.snapshot());

        // 캔버스 클릭 시 빅뱅 + 자동 재생
        renderer.m_onPlayClick = function() {
            pipeline.play();
            renderer.render(pipeline.snapshot());
            renderInfo(pipeline.snapshot());
            p_updateCtrl();
        };
    });
</script>
</body>
</html>
